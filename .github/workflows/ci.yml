name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov bandit

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: |
          pip install types-PyYAML types-defusedxml
          mypy src/backuppilot/

      - name: Run tests with coverage
        run: pytest tests/ --cov=backuppilot --cov-report=xml --cov-fail-under=100

      - name: Security scan with bandit
        run: bandit -r src/backuppilot/ -ll

      - name: Smoke test
        run: backuppilot --help
